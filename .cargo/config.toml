# Cargo configuration for esp-csi-rs
#
# Two flavors of every alias:
#   `cargo esp32`        — run with println logging (default).
#   `cargo esp32-defmt`  — run with defmt logging (enables the `defmt` feature
#                           and tells espflash to decode defmt frames).
# Replace `esp32` with any of: esp32, esp32c3, esp32c5, esp32c6, esp32s3.
# `-build` variants compile without flashing/running.
#
# The `-Tdefmt.x` linker script is added automatically by `build.rs` whenever
# the `defmt` cargo feature is on — no need to edit this file to switch.

[alias]
# Run aliases — println (default).
esp32 = "run --release --features=esp32   --target=xtensa-esp32-none-elf"
esp32c3 = "run --release --features=esp32c3 --target=riscv32imc-unknown-none-elf"
esp32c5 = "run --release --features=esp32c5 --target=riscv32imac-unknown-none-elf"
esp32c6 = "run --release --features=esp32c6 --target=riscv32imac-unknown-none-elf"
esp32s3 = "run --release --features=esp32s3 --target=xtensa-esp32s3-none-elf"

# Run aliases — defmt. Override the runner via `--config` so espflash decodes defmt frames.
esp32-defmt   = "run --release --no-default-features --features=esp32,no-std,auto,defmt     --target=xtensa-esp32-none-elf       --config=target.xtensa-esp32-none-elf.runner=['espflash','flash','--monitor','--log-format','defmt']"
esp32c3-defmt = "run --release --no-default-features --features=esp32c3,no-std,auto,defmt   --target=riscv32imc-unknown-none-elf  --config=target.riscv32imc-unknown-none-elf.runner=['espflash','flash','--monitor','--log-format','defmt']"
esp32c5-defmt = "run --release --no-default-features --features=esp32c5,no-std,auto,defmt   --target=riscv32imac-unknown-none-elf --config=target.riscv32imac-unknown-none-elf.runner=['espflash','flash','--monitor','--log-format','defmt']"
esp32c6-defmt = "run --release --no-default-features --features=esp32c6,no-std,auto,defmt   --target=riscv32imac-unknown-none-elf --config=target.riscv32imac-unknown-none-elf.runner=['espflash','flash','--monitor','--log-format','defmt']"
esp32s3-defmt = "run --release --no-default-features --features=esp32s3,no-std,auto,defmt   --target=xtensa-esp32s3-none-elf      --config=target.xtensa-esp32s3-none-elf.runner=['espflash','flash','--monitor','--log-format','defmt']"

# Build-only variants (no flash/monitor).
esp32-build   = "build --release --features=esp32   --target=xtensa-esp32-none-elf"
esp32c3-build = "build --release --features=esp32c3 --target=riscv32imc-unknown-none-elf"
esp32c5-build = "build --release --features=esp32c5 --target=riscv32imac-unknown-none-elf"
esp32c6-build = "build --release --features=esp32c6 --target=riscv32imac-unknown-none-elf"
esp32s3-build = "build --release --features=esp32s3 --target=xtensa-esp32s3-none-elf"

esp32-build-defmt   = "build --release --no-default-features --features=esp32,no-std,auto,defmt   --target=xtensa-esp32-none-elf"
esp32c3-build-defmt = "build --release --no-default-features --features=esp32c3,no-std,auto,defmt --target=riscv32imc-unknown-none-elf"
esp32c5-build-defmt = "build --release --no-default-features --features=esp32c5,no-std,auto,defmt --target=riscv32imac-unknown-none-elf"
esp32c6-build-defmt = "build --release --no-default-features --features=esp32c6,no-std,auto,defmt --target=riscv32imac-unknown-none-elf"
esp32s3-build-defmt = "build --release --no-default-features --features=esp32s3,no-std,auto,defmt --target=xtensa-esp32s3-none-elf"

[target.'cfg(target_arch = "riscv32")']
runner = "espflash flash --monitor"
rustflags = [
  "-C",
  "link-arg=-Tlinkall.x",
]

[target.'cfg(target_arch = "xtensa")']
runner = "espflash flash --monitor"
rustflags = [
  "-C",
  "link-arg=-Wl,-Tlinkall.x",
  "-C",
  "link-arg=-nostartfiles",
]

[env]
# Default log level for ESP-IDF logging output.
ESP_LOG = "INFO"
# Match monitor baud with UART logger baud (see src/lib/logging/logging.rs).
MONITOR_BAUD = "115200"
# defmt log filter (only consulted when the `defmt` feature is on).
DEFMT_LOG = "info"

[unstable]
# Build core/alloc for no_std targets.
build-std = ["alloc", "core"]
